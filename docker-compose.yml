services:
  # ==========================================
  # 1. Database (Business + LangFuse)
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: ai_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_platform # 默认创建业务库
      # ⚠️ 注意：LangFuse 库需要通过 init 脚本创建，见下方说明
    ports:
      - "9500:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      # ✅ 新增：确保数据库真的准备好了
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai_platform_net

  # ==========================================
  # 2. Infrastructure (Redis)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    restart: always
    ports:
      - "9501:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - ai_platform_net

  # ==========================================
  # 3. Object Storage (MinIO)
  # ==========================================
  minio:
    # 使用最新版本
    image: minio/minio:RELEASE.2025-06-13T11-33-47Z-cpuv1
    # 或者锁定一个具体的近期稳定版 (推荐生产环境使用具体版本号，防止自动升级导致意外)
    # image: minio/minio:RELEASE.2024-11-07T00-52-20Z

    container_name: ai_platform_minio
    restart: always
    environment:
      # ⚠️ 新版必须使用 ROOT_USER 和 ROOT_PASSWORD
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

      # 显式锁定端口，防止混淆
      MINIO_ADDRESS: ":9000"
      MINIO_CONSOLE_ADDRESS: ":9001"

      # 优化：如果是单节点，建议关闭一些分布式检查以加快启动
      MINIO_BROWSER_REDIRECT_URL: "http://localhost:9001"

    ports:
      - "9502:9000" # API Port
      - "9503:9001" # Console Port
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"

    # --- 健康检查 (适配新版镜像) ---
    # 新版镜像可能没有 curl，使用 bash 的原生 TCP 连接来检查端口是否存活
    healthcheck:
      test: [ "CMD-SHELL", "bash -c '</dev/tcp/localhost/9000'" ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - ai_platform_net

  # ==========================================
  # 4. Vector Database (Milvus Standalone)
  # ==========================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai_platform_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - ai_platform_net

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: ai_platform_milvus
    command: [ "milvus", "run", "standalone" ]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: milvus-bucket
    volumes:
      - ./data/milvus:/var/lib/milvus
    ports:
      - "9504:19530"
      - "9505:9091"
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_healthy # ✅ 优化：等 MinIO 健康了再启动
    networks:
      - ai_platform_net

  # ==========================================
  # 5. Observability (LangFuse)
  # ==========================================
  clickhouse:
    image: clickhouse/clickhouse-server:23
    container_name: ai_platform_clickhouse
    # user: "101:101"  <-- ⚠️ 建议注释掉，除非你确定宿主机文件夹权限已设为 101
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "9507:8123"
      - "9508:9009"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    healthcheck:
      # ✅ 新增：确保 CH 准备好了
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8123/ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai_platform_net

  langfuse:
    image: langfuse/langfuse:2
    container_name: ai_platform_langfuse
    depends_on:
      db:
        condition: service_healthy # ✅ 关键：必须等 DB 建好表
      clickhouse:
        condition: service_healthy # ✅ 关键：必须等 CH 启动
    ports:
      - "9506:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/langfuse
      - DATABASE_TRACING_ENABLED=false
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DB=default
      - NEXTAUTH_SECRET=auto_generated_secret_for_dev_mode
      - SALT=auto_generated_salt_for_dev_mode
      - NEXTAUTH_URL=http://localhost:9506
      - LANGFUSE_INIT_ORG_ID=org_default
      - LANGFUSE_INIT_PROJECT_ID=p_default
      - LANGFUSE_INIT_USER_EMAIL=admin@admin.com
      - LANGFUSE_INIT_USER_NAME=Admin
      - LANGFUSE_INIT_USER_PASSWORD=password
      - TELEMETRY_ENABLED=false
    networks:
      - ai_platform_net

  # ==========================================
  # 6. Document Server (OnlyOffice)
  # ==========================================
  onlyoffice:
    image: onlyoffice/documentserver:latest
    container_name: ai_platform_onlyoffice
    restart: always
    environment:
      # JWT 安全配置 (临时禁用用于调试)
      - JWT_ENABLED=false
      - JWT_SECRET=ai_platform_onlyoffice_secret
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
      # 文档编辑限制 (可选)
      - ALLOW_META_IP_ADDRESS=true
      - ALLOW_PRIVATE_IP_ADDRESS=true
      # 禁用插件下载 (解决国内网络无法访问 GitHub 的问题)
      - PLUGIN_MARKETPLACE_URL=false
    ports:
      - "9509:80" # Web 访问端口
    volumes:
      - ./data/onlyoffice/logs:/var/log/onlyoffice
      - ./data/onlyoffice/data:/var/www/onlyoffice/Data
      - ./data/onlyoffice/lib:/var/lib/onlyoffice
      - ./data/onlyoffice/fonts:/usr/share/fonts/truetype/custom
      - ./data/onlyoffice/db:/var/lib/postgresql
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s # OnlyOffice 启动较慢，给予充足启动时间
    networks:
      - ai_platform_net

networks:
  ai_platform_net:
    driver: bridge
