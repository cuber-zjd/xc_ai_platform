version: '3.9'

services:
  # ==========================================
  # 1. Database (Business + LangFuse)
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: ai_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_platform
    ports:
      - "9500:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d # Auto-create 'langfuse' db on first run

  # ==========================================
  # 2. Infrastructure (Redis)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    restart: always
    ports:
      - "9501:6379"
    volumes:
      - ./data/redis:/data

  # ==========================================
  # 3. Object Storage (MinIO)
  # Used by: App (Files), Milvus (Storage)
  # ==========================================
  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    container_name: ai_platform_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9502:9000" # API
      - "9503:9001" # Console
    volumes:
      - ./data/minio:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ==========================================
  # 4. Vector Database (Milvus Standalone)
  # ==========================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ai_platform_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd

  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: ai_platform_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: milvus-bucket
    volumes:
      - ./data/milvus:/var/lib/milvus
    ports:
      - "9504:19530"
      - "9505:9091"
    depends_on:
      - etcd
      - minio

  # ==========================================
  # 5. Observability (LangFuse)
  # ==========================================
  clickhouse:
    image: clickhouse/clickhouse-server:23
    container_name: ai_platform_clickhouse
    user: "101:101"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "9507:8123"
      - "9508:9009"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse

  langfuse:
    image: langfuse/langfuse:2
    container_name: ai_platform_langfuse
    depends_on:
      - db
      - clickhouse
    ports:
      - "9506:3000"
    environment:
      - NODE_ENV=production
      # Database
      - DATABASE_URL=postgresql://postgres:password@db:5432/langfuse
      - DATABASE_TRACING_ENABLED=false
      # ClickHouse
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=
      - CLICKHOUSE_DB=default
      # Auth (Generate secrets via 'openssl rand -base64 32')
      - NEXTAUTH_SECRET=auto_generated_secret_for_dev_mode
      - SALT=auto_generated_salt_for_dev_mode
      - NEXTAUTH_URL=http://localhost:9506
      # Initial Admin User (Will be created on startup)
      - LANGFUSE_INIT_ORG_ID=org_default
      - LANGFUSE_INIT_PROJECT_ID=p_default
      - LANGFUSE_INIT_USER_EMAIL=admin@admin.com
      - LANGFUSE_INIT_USER_NAME=Admin
      - LANGFUSE_INIT_USER_PASSWORD=password
      # Telemetry
      - TELEMETRY_ENABLED=false

networks:
  default:
    name: ai_platform_net
